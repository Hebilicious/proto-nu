name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.94.1
          components: rustfmt
          targets: wasm32-wasip1

      - name: Cargo fmt
        run: cargo fmt --all --check

      - name: Cargo test
        run: cargo test

      - name: Build WASM plugin
        run: cargo build --target wasm32-wasip1

  e2e:
    name: E2E
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Docker e2e
        run: ./tests/e2e/run.sh
